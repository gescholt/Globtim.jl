name: Documentation

on:
  workflow_dispatch:
  # Auto-triggers disabled until companion packages (GlobtimPlots,
  # GlobtimPostProcessing) are registered on JuliaRegistries/General — the
  # docs build develops them via [sources] paths that don't exist on the
  # public repo, and they aren't yet on the registry. Re-enable push/PR
  # triggers after the full registration wave completes.

jobs:
  build:
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs/ docs/make.jl
